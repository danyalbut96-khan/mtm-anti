<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartDoc AI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f7fe;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-card {
            background: white;
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }
        .auth-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: var(--transition);
        }
        .auth-tab.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            background: #f8faff;
        }
        .auth-body {
            padding: 30px;
        }
        
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            background: white;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 20px;
            transition: var(--transition);
        }
        .social-btn:hover {
            background: #f8f9fa;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
             <a href="index.html" class="logo"><i class="fa-solid fa-user-doctor"></i> SmartDoc <span>AI</span></a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <div class="auth-tab active">Patient Login</div>
                <div class="auth-tab">Doctor Login</div>
            </div>
            <div class="auth-body">
                <h3 style="text-align:center; margin-bottom:25px;">Welcome Back</h3>
                
                <button class="social-btn">
                    <img src="https://www.svgrepo.com/show/355037/google.svg" width="20" alt="G">
                    Continue with Google
                </button>

                <div class="divider">Or continue with email</div>

                <form action="patient-dashboard.html">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <div style="display:flex; justify-content:space-between;">
                            <label class="form-label">Password</label>
                            <a href="#" style="font-size:12px; color:var(--primary-color);">Forgot?</a>
                        </div>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <div style="display:flex; align-items:center; gap:8px; margin-bottom:20px;">
                        <input type="checkbox" id="remember">
                        <label for="remember" style="font-size:14px; cursor:pointer;">Remember me</label>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width:100%; padding:14px;">Log In</button>
                </form>

                <p style="text-align:center; font-size:14px; margin-top:25px; color:var(--text-light);">
                    Don't have an account? <a href="doctor-register.html" style="color:var(--primary-color); font-weight:600;">Sign up now</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
